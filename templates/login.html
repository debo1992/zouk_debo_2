<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShreeFlows Session Packages</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              charcoal: "#0F1217",
              brandteal: "#0D5C63",
              gold: "#C9A227",
              energy: "#00B4D8",
              brandpurple: "#4A2C7A",
              sage: "#D3DFCF",
            },
          },
        },
      };
    </script>
</head>
<body class="bg-charcoal text-white">

  <!-- NAV -->
  <nav class="bg-charcoal shadow-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-26">
        <div class="flex items-center">
          <div class="flex flex-col items-center mt-6">
              <img class="h-12 w-auto" src="{{ url_for('static', filename='logo.png') }}" alt="ShreeFlows Logo">
              <span class="-mt-1 text-xl font-bold text-center">
                  <span class="text-sage">ShreeFlows</span>
              </span>
          </div>
        </div>
        <div class="hidden md:flex items-center space-x-8">
          <a href="{{ url_for('home') }}" class="nav-link px-3 py-2 text-sm font-medium text-gold hover:text-sage">Home</a>
          <a href="{{ url_for('home') }}#benefits" class="nav-link px-3 py-2 text-sm font-medium text-gold hover:text-sage">About</a>
          <a href="{{ url_for('timetable') }}" class="nav-link px-3 py-2 text-sm font-medium text-gold hover:text-sage">Timetable</a>
          <a href="{{ url_for('pricing') }}" class="nav-link px-3 py-2 text-sm font-medium text-gold hover:text-sage">Styles</a>
          <a href="{{ url_for('home') }}#upcoming-events" class="nav-link px-3 py-2 text-sm font-medium text-gold hover:text-sage">Events</a>
          <a href="{{ url_for('home') }}#footer" class="nav-link px-3 py-2 text-sm font-medium text-gold hover:text-sage">Contact</a>
          <a href="#" class="px-4 py-2 text-sm font-medium text-charcoal bg-energy rounded-md hover:bg-gold transition duration-300">Login</a>
        </div>
      </div>
    </div>  
  </nav>
  <br><br>
<div class="min-h-screen flex flex-col justify-center items-center bg-charcoal text-center">
    <div class="bg-brandteal p-8 rounded-2xl shadow-lg w-full max-w-md">
        <h2 class="text-gold font-semibold mb-8 text-lg">Login to ShreeFlows!</h2>

        <form method="POST" class="space-y-4">
            <div>
                <label class="block mb-1 text-sage">Email:</label>
                <input type="text" name="email" required class="text-charcoal bg-white p-2 rounded w-full">
            </div>

            <div>
                <label class="block mb-1 text-sage">Password:</label>
                <input type="password" name="password" required class="text-charcoal bg-white p-2 rounded w-full">
            </div>

            <button type="submit" class="px-6 py-3 text-sm font-medium text-charcoal bg-energy rounded-md hover:bg-gold transition duration-300 w-full">
                Login
            </button>
        </form>

        <p class="mt-4 text-gray-300">
            Don't have an account?
            <a href="{{ url_for('signup') }}" class="text-sage hover:text-gold font-semibold">Sign up</a>
        </p>
    </div>
</div>


    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul>
          {% for msg in messages %}
            <li>{{ msg }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}
  <script>
        AOS.init({
            duration: 800,
            easing: 'ease-in-out',
            once: true
        });
        feather.replace();
        
        // Mobile menu toggle
        document.querySelector('[data-feather="menu"]').addEventListener('click', function() {
            // Add mobile menu functionality here
            console.log('Mobile menu clicked');
        });
    </script>
</body>
</html>
