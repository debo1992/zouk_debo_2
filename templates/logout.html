<!DOCTYPE html>
<html lang="en">
<head>

  <title>Logout - ShreeFlows</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              charcoal: "#0F1217",
              brandteal: "#0D5C63",
              gold: "#C9A227",
              energy: "#00B4D8",
              brandpurple: "#4A2C7A",
              sage: "#D3DFCF",
            },
          },
        },
      };
    </script>
</head>

  <div class="text-center">

    <a href="{{ url_for('login') }}" 
       class="px-6 py-3 bg-energy text-charcoal font-semibold rounded-md hover:bg-gold transition duration-300">
       Login Again
    </a>
    <a href="{{ url_for('home') }}" 
       class="ml-4 px-6 py-3 border border-gold text-gold font-semibold rounded-md hover:bg-energy hover:text-charcoal transition duration-300">
